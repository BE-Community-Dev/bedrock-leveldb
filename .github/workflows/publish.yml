name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.87.0
          components: clippy, rustfmt
      - name: Verify tag matches crate version
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "tag v$tag does not match crate version $version" >&2
            exit 1
          fi
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: Test all features
        run: cargo test --all-features
      - name: Test no default features
        run: cargo test --no-default-features
      - name: Test feature matrix
        run: |
          cargo test --no-default-features --features zlib
          cargo test --no-default-features --features snappy
          cargo test --no-default-features --features async
          cargo test --no-default-features --features mmap
      - name: Docs
        run: cargo doc --all-features --no-deps
      - name: Public API docs
        run: cargo rustdoc --all-features -- -D missing_docs
      - name: Dry run
        run: cargo publish --dry-run
      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --no-verify
